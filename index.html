<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capybara Cozy Space</title>

<style>
/* ==========================================
   DESIGN SYSTEM
========================================== */
:root {
    --bg-main: #FFFDF3;
    --bg-sub: #F7EFE5;
    --primary: #E29C68;
    --primary-dark: #C47F4D;
    --secondary: #F5E1A4;
    --bubble-bg: #4A3F35;
    --text-main: #4A3E3D;
    --text-muted: #8A7B77;
    --white: #FFFFFF;
}

/* ==========================================
   BASE
========================================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Pretendard', system-ui, sans-serif;
}

body {
    background: var(--bg-main);
    color: var(--text-main);
}

/* ==========================================
   HERO
========================================== */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle, #FFFDF5, #FAF2E7);
    text-align: center;
}

.speech-bubble {
    background: var(--bubble-bg);
    color: white;
    padding: 14px 22px;
    border-radius: 20px;
    margin-bottom: 25px;
    display: inline-block;
}

.hero-capybara-space {
    width: 240px;
    height: 200px;
    margin: auto;
    position: relative;
}

.main-capybara {
    width: 220px;
    height: 170px;
    background: #A07A56;
    border-radius: 90px;
    border: 4px solid var(--text-main);
    position: absolute;
    bottom: 0;
    left: 10px;
}

.main-capybara .eye {
    width: 12px;
    height: 12px;
    background: var(--text-main);
    border-radius: 50%;
    position: absolute;
    top: 55px;
    right: 45px;
}

.main-capybara .snout {
    width: 40px;
    height: 50px;
    background: #523D2A;
    border-radius: 40%;
    position: absolute;
    right: -6px;
    top: 50px;
}

.orange-on-head {
    width: 38px;
    height: 32px;
    background: orange;
    border-radius: 50%;
    position: absolute;
    top: -10px;
    right: 70px;
}

/* ==========================================
   MUSIC SECTION
========================================== */
.music-section {
    padding: 120px 20px;
    background: linear-gradient(to bottom, #FFFDF3, #F7EFE5);
    text-align: center;
}

/* CD PLAYER */
.cd-player {
    width: 260px;
    height: 260px;
    margin: 40px auto;
    position: relative;
}

.player-body {
    width: 260px;
    height: 260px;
    background: white;
    border: 4px solid var(--text-main);
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 12px 12px 0 rgba(226,156,104,0.2);
}

.record-wrap {
    width: 180px;
    height: 180px;
    position: relative;
    animation: spin 4s linear infinite;
}

.record {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle, #2b2b2b 40%, #111 100%);
    border: 4px solid var(--text-main);
    position: absolute;
}

/* CD center */
.record::after {
    content: "";
    width: 40px;
    height: 40px;
    background: var(--secondary);
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border: 3px solid var(--text-main);
}

/* 🐹 카피바라 (CD 위에 앉아있음) */
.capybara-on-cd {
    position: absolute;
    width: 70px;
    height: 55px;
    background: #A07A56;
    border-radius: 40px;
    border: 3px solid var(--text-main);
    top: 35px;
    left: 55px;
    z-index: 2;
}

/* 눈 */
.capybara-on-cd::before {
    content: "";
    position: absolute;
    width: 8px;
    height: 8px;
    background: var(--text-main);
    border-radius: 50%;
    top: 18px;
    right: 12px;
}

/* 귀 */
.capybara-on-cd::after {
    content: "";
    position: absolute;
    width: 12px;
    height: 12px;
    background: #88623E;
    border-radius: 50%;
    top: 6px;
    left: 10px;
    border: 2px solid var(--text-main);
}

/* INPUT */
.song-box {
    margin-top: 30px;
}

.song-input {
    width: 60%;
    padding: 12px;
    border-radius: 20px;
    border: 3px solid var(--text-main);
    outline: none;
}

.song-btn {
    margin-top: 10px;
    padding: 10px 20px;
    border-radius: 20px;
    border: 3px solid var(--text-main);
    background: white;
    cursor: pointer;
    font-weight: bold;
}

.song-list {
    margin-top: 40px;
    max-width: 600px;
    margin: auto;
}

.song-item {
    background: white;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 14px;
    border: 2px dashed var(--text-main);
}

/* ==========================================
   ANIMATION
========================================== */
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div>
        <div class="speech-bubble">김나은의 아늑한 공간 🎧</div>

        <div class="hero-capybara-space">
            <div class="orange-on-head"></div>
            <div class="main-capybara">
                <div class="eye"></div>
                <div class="snout"></div>
            </div>
        </div>
    </div>
</section>

<!-- MUSIC -->
<section class="music-section">

    <h2>🎧 오늘의 노래</h2>
    <p>당신의 하루를 음악으로 남겨주세요</p>

    <!-- CD -->
    <div class="cd-player">
        <div class="player-body">

            <div class="record-wrap">
                <div class="record"></div>
                <div class="capybara-on-cd"></div>
            </div>

        </div>
    </div>

    <!-- INPUT -->
    <div class="song-box">
        <input id="songInput" class="song-input" placeholder="예: IU - 밤편지">
        <br>
        <button class="song-btn" onclick="addSong()">노래 추가 🎶</button>
    </div>

    <!-- LIST -->
    <div class="song-list" id="songList"></div>

</section>

<script>
function addSong(){
    const input = document.getElementById("songInput");
    const value = input.value.trim();
    if(!value) return;

    const list = document.getElementById("songList");

    const item = document.createElement("div");
    item.className = "song-item";
    item.textContent = "🎧 " + value;

    list.prepend(item);

    saveSong(value);
    input.value = "";
}

function saveSong(song){
    let songs = JSON.parse(localStorage.getItem("songs") || "[]");
    songs.unshift(song);
    localStorage.setItem("songs", JSON.stringify(songs));
}

function loadSongs(){
    let songs = JSON.parse(localStorage.getItem("songs") || "[]");
    const list = document.getElementById("songList");

    songs.forEach(song=>{
        const item = document.createElement("div");
        item.className = "song-item";
        item.textContent = "🎧 " + song;
        list.appendChild(item);
    });
}

loadSongs();
</script>

</body>
</html>
