<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capybara Cozy Space</title>

<style>
/* =========================
   기존 스타일 그대로 유지
   ========================= */

/* ===== 추가: CD PLAYER SECTION ===== */
.music-section{
    background: linear-gradient(to bottom, #FFFDF3, #F7EFE5);
}

.cd-player {
    width: 260px;
    height: 260px;
    margin: 40px auto;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* CD 바깥 플레이어 */
.player-body {
    width: 260px;
    height: 260px;
    background: #fff;
    border: 4px solid #4A3E3D;
    border-radius: 30px;
    box-shadow: 12px 12px 0 rgba(226,156,104,0.2);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 회전 디스크 */
.record {
    width: 180px;
    height: 180px;
    background: radial-gradient(circle, #2b2b2b 40%, #111 100%);
    border-radius: 50%;
    border: 4px solid #4A3E3D;
    animation: spin 4s linear infinite;
    position: relative;
}

/* CD 가운데 */
.record::after {
    content: "";
    position: absolute;
    width: 40px;
    height: 40px;
    background: #F5E1A4;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border: 3px solid #4A3E3D;
}

/* 입력 영역 */
.song-box {
    text-align: center;
    margin-top: 30px;
}

.song-input {
    width: 70%;
    padding: 12px;
    border-radius: 20px;
    border: 3px solid #4A3E3D;
    outline: none;
    font-size: 1rem;
}

.song-btn {
    margin-top: 10px;
    padding: 10px 20px;
    border-radius: 20px;
    border: 3px solid #4A3E3D;
    background: #fff;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.song-btn:hover {
    transform: translateY(2px);
    background: #F5E1A4;
}

/* 리스트 */
.song-list {
    margin-top: 30px;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
}

.song-item {
    background: #fff;
    border: 2px dashed #4A3E3D;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 15px;
    font-weight: 600;
}

/* 회전 애니메이션 */
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<!-- ================= HERO ~ 기존 그대로 ================= -->
<section class="hero">
    <div class="hero-container">
        <h1 style="font-size:2rem;">🎧 오늘의 노래를 남겨주세요</h1>
        <p>당신의 하루를 채운 노래는 무엇인가요?</p>
    </div>
</section>

<!-- ================== 🎵 MUSIC SECTION 추가 ================== -->
<section class="music-section">

    <div class="section-header">
        <span class="section-category">Today Music</span>
        <h2 class="section-title">My Cozy Playlist</h2>
    </div>

    <!-- CD PLAYER -->
    <div class="cd-player">
        <div class="player-body">
            <div class="record"></div>
        </div>
    </div>

    <!-- INPUT -->
    <div class="song-box">
        <input type="text" id="songInput" class="song-input" placeholder="예: IU - 밤편지">
        <br>
        <button class="song-btn" onclick="addSong()">노래 추가하기 🎶</button>
    </div>

    <!-- LIST -->
    <div class="song-list" id="songList"></div>

</section>

<!-- ================= FOOTER ================= -->
<footer>
    <p>Capybara Cozy Space 🎵</p>
</footer>

<script>
/* =========================
   노래 추가 기능
   ========================= */

function addSong(){
    const input = document.getElementById("songInput");
    const value = input.value.trim();

    if(value === "") return;

    const list = document.getElementById("songList");

    const item = document.createElement("div");
    item.className = "song-item";
    item.textContent = "🎧 " + value;

    list.prepend(item);

    saveSong(value);

    input.value = "";
}

/* localStorage 저장 */
function saveSong(song){
    let songs = JSON.parse(localStorage.getItem("songs") || "[]");
    songs.unshift(song);
    localStorage.setItem("songs", JSON.stringify(songs));
}

/* 불러오기 */
function loadSongs(){
    let songs = JSON.parse(localStorage.getItem("songs") || "[]");
    const list = document.getElementById("songList");

    songs.forEach(song=>{
        const item = document.createElement("div");
        item.className = "song-item";
        item.textContent = "🎧 " + song;
        list.appendChild(item);
    });
}

loadSongs();
</script>

</body>
</html>
