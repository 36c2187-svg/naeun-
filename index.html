<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capybara Cozy Space</title>

<style>
/* ==========================================
   DESIGN SYSTEM & RESET
========================================== */
:root {
    --bg-main: #FFFDF3;
    --bg-sub: #F7EFE5;
    --primary: #E29C68;
    --primary-dark: #C47F4D;
    --secondary: #F5E1A4;
    --bubble-bg: #4A3F35;
    --text-main: #4A3E3D;
    --text-muted: #8A7B77;
    --white: #FFFFFF;
    --card-shadow: 0 16px 32px rgba(74, 62, 61, 0.04);
    --card-shadow-hover: 0 24px 48px rgba(226, 156, 104, 0.12);
    --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Pretendard', system-ui, sans-serif;
}

body {
    background-color: var(--bg-main);
    color: var(--text-main);
    overflow-x: hidden;
    line-height: 1.6;
}

html {
    scroll-behavior: smooth;
}

/* 스크롤바 */
::-webkit-scrollbar {
    width: 10px;
}
::-webkit-scrollbar-track {
    background: var(--bg-main);
}
::-webkit-scrollbar-thumb {
    background: var(--secondary);
    border-radius: 10px;
    border: 3px solid var(--bg-main);
}

.container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
}

section {
    padding: 140px 0;
}

/* ================= HERO ================= */

.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle, #FFFDF5, #FAF2E7);
    position: relative;
}

.hero-container {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* 말풍선 */
.speech-bubble {
    background: var(--bubble-bg);
    color: white;
    padding: 16px 28px;
    border-radius: 24px;
    margin-bottom: 30px;
}

/* 카피바라 */
.hero-capybara-space {
    width: 240px;
    height: 200px;
    position: relative;
}

.main-capybara {
    width: 220px;
    height: 170px;
    background: #A07A56;
    border-radius: 90px;
    border: 4px solid var(--text-main);
    position: absolute;
    bottom: 0;
}

/* CD 영역 */
.cd-player {
    width: 260px;
    height: 260px;
    margin: 40px auto;
    position: relative;
}

.player-body {
    width: 260px;
    height: 260px;
    background: white;
    border: 4px solid var(--text-main);
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.record {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle, #2b2b2b, #111);
    animation: spin 4s linear infinite;
    position: relative;
}

/* 🐹 CD 위 카피바라 */
.capybara-on-cd {
    position: absolute;
    width: 70px;
    height: 55px;
    background: #A07A56;
    border-radius: 40px;
    border: 3px solid var(--text-main);
    top: 35px;
    left: 55px;
    z-index: 2;
}

/* 입력창 */
.song-box {
    text-align: center;
    margin-top: 30px;
}

.song-input {
    width: 60%;
    padding: 12px;
    border-radius: 20px;
    border: 3px solid var(--text-main);
}

.song-btn {
    margin-top: 10px;
    padding: 10px 20px;
    border-radius: 20px;
    border: 3px solid var(--text-main);
    background: white;
    cursor: pointer;
}

.song-list {
    margin-top: 30px;
    max-width: 600px;
    margin: auto;
}

.song-item {
    padding: 12px;
    margin-bottom: 10px;
    background: white;
    border-radius: 14px;
    border: 2px dashed var(--text-main);
}

/* 애니메이션 */
@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div class="hero-container">

        <div class="speech-bubble">김나은의 아늑한 공간 🎧</div>

        <div class="hero-capybara-space">
            <div class="main-capybara"></div>
        </div>

    </div>
</section>

<!-- CD + MUSIC -->
<section class="music-section">

    <div class="cd-player">
        <div class="player-body">
            <div class="record">
                <div class="capybara-on-cd"></div>
            </div>
        </div>
    </div>

    <!-- 음악 추가 -->
    <div class="song-box">
        <input id="songInput" class="song-input" placeholder="예: IU - 밤편지">
        <br>
        <button class="song-btn" onclick="addSong()">노래 추가 🎶</button>
    </div>

    <div class="song-list" id="songList"></div>

</section>

<script>
function addSong() {
    const input = document.getElementById("songInput");
    const value = input.value.trim();
    if (!value) return;

    const list = document.getElementById("songList");

    const item = document.createElement("div");
    item.className = "song-item";
    item.textContent = "🎧 " + value;

    list.prepend(item);

    input.value = "";
}
</script>

</body>
</html>
